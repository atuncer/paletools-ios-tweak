name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual runs (artifacts only, no release)

permissions:
  contents: write # required to create/upload to Releases

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools (ldid for signing, dpkg for packaging)
        run: brew install ldid dpkg

      - name: Set up Node (used by build-inject.sh)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Build (.deb + standalone .dylib)
        run: make package FINALPACKAGE=1

      - name: Show outputs
        run: ls -la packages/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paletools-binaries
          path: |
            packages/*.deb
            packages/PaleTools.dylib
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*.deb
            packages/PaleTools.dylib
          fail_on_unmatched_files: true
          generate_release_notes: true
