name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual runs (artifacts only, no release)

permissions:
  contents: write # required to create/upload to Releases

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build tools (ldid for signing, dpkg for packaging)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          # Drop pre-installed untrusted taps so brew doesn't warn about them.
          brew untap aws/tap azure/bicep 2>/dev/null || true
          brew install ldid dpkg

      - name: Set up Node (used by build-inject.sh)
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cache Theos
        uses: actions/cache@v5
        with:
          path: ~/theos
          # Bump the suffix to force a fresh Theos clone.
          key: theos-${{ runner.os }}-v1

      - name: Set up Theos
        run: |
          if [ ! -d "$HOME/theos/makefiles" ]; then
            git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          else
            echo "Theos restored from cache."
          fi
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Build (.deb + standalone .dylib)
        run: make package FINALPACKAGE=1

      - name: Show outputs
        run: ls -la packages/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: paletools-binaries
          path: |
            packages/*.deb
            packages/PaleTools.dylib
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*.deb
            packages/PaleTools.dylib
          fail_on_unmatched_files: true
          generate_release_notes: true
